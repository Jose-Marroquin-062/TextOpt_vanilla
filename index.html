<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextOpt_Vanilla</title>
</head>
<body>
    <header class="container-header">
        <h1 class="header-title">TextOpt</h1>
        <!-- Barra de navegación -->
        <nav class="container-nav">
            <ul>
                <li>Home</li>
                <li>Convetir a Mayúsculas</li>
                <li>Convetir a Minúsculas</li>
                <li>Buscar palabra</li>
            </ul>
        </nav>
    </header>
    <main class="container-main">
        <!-- Presentación de la aplicación -->
        <section class="section-presentation">
            <h1 class="title-start">Hola, Bienvenido</h1>

            <p>Está herramienta para texto, ofrece opciones para convertir texto a minúsculas ó mayúsculas. Contando con la opción de buscar cierta palabra un texto proporcionado.</p>
        </section>
        <!-- Botones para abrir opciones -->
        <section class="section-options">
            <button id="btnConvertir-Mayuscula">Convertir a Mayúsculas</button>
            <button id="btnConvertir-Minusculas">Convertir a Minúsculas</button>
            <button id="btnBuscar-Palabra">Buscar Palabra</button>
        </section>
    </main>
</body>
</html>
